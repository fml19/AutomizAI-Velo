# Workflow de Integração Contínua (CI)
# Objetivo: executar os testes unitários e E2E a cada push ou pull request.
# Os jobs são independentes para facilitar a manutenção e a expansão futura.

name: Continuous Deployment

# Executa o workflow em pushes e pull requests nas branches principais.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Versão do Node.js utilizada pelo job de testes unitários.
env:
  NODE_VERSION: "24"
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORGID }}
  VERCEL_SCOPE: fernando-ml

jobs:
  # Executa os testes unitários da aplicação com Vitest.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Obtém o código do repositório.
      - name: Checkout repository
        uses: actions/checkout@v7

      # Configura o ambiente Node.js na versão definida globalmente.
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn.
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências preservando as versões do yarn.lock.
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Executa os testes unitários com Vitest.
      - name: Run unit tests
        run: yarn test

  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deploument-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # 5. Obter as configurações do Vercel
      - name: Pull Vercel Config
        run: yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE

      # 6. Build e deploy remotos com as variáveis Sensitive de Preview.
      - name: Deploy preview
        id: deploy
        run: |
          URL=$(yarn --silent vercel deploy --yes --target=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # 5. Instala o Chromium e as dependências de sistema do Playwright
      - name: Install Playwright Browser
        run: yarn playwright install --with-deps chromium

      # 6. Executa a regressão contra o Preview e publica o resultado no TestDino
      - name: Run Regression tests and publish TestDino report
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deploument-url }}
          DATABASE_URL: ${{ secrets.SUPABASE_PREVIEW_DATABASE_URL }}
          TESTDINO_TOKEN: ${{ secrets.TD_TOKEN }}

      # 7. Relatório de Teste Automatizados
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report-preview
          path: playwright-report

  promote:
    name: Build & Deploy Production
    needs: [build-and-deploy, e2e-tests]
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      # Usa exatamente o commit que passou pelos testes E2E.
      - name: Checkout tested commit
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Baixa exclusivamente as configurações do ambiente Production.
      - name: Pull Vercel Production Config
        run: yarn vercel pull --yes --environment=production --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE

      # Gera e publica remotamente um bundle novo com as variáveis Sensitive de Production.
      - name: Deploy Production
        id: deploy
        run: |
          URL=$(yarn --silent vercel deploy --yes --prod --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT
